workflow:
  name: update-skills-readme
  mode: dag
  onError: abort

  agents:
    generate:
      ref: worker
      model: zai/glm-5-turbo
      task: |
        Regenerate the skills directory README from the current skill folders.
        1. Run: cd skills && python generate_readme.py
        2. Verify the command completes without errors
        3. Call task_complete with status: completed and this JSON as the summary:
        {"generated":true}
        IMPORTANT: The summary must be ONLY the JSON object, no extra text.
      waits_for: []

    update-main:
      ref: worker
      model: zai/glm-5-turbo
      waits_for: [generate]
      task: |
        Update the main README.md with any new skills found in skills/README.md.

        You will perform these steps in order:

        1. Read skills/README.md — this is the freshly generated catalog of all skills.
        2. Read README.md at the repository root — this is the main repo README.
        3. Parse skills/README.md to extract every skill entry, noting its category folder name and brief description.
        4. Parse README.md to identify which skills are already listed (match by skill name).
        5. Determine the set of new skills that appear in skills/README.md but NOT in README.md.

        If no new skills exist:
        - Call task_complete with status: completed and summary: "No new skills to add."

        If there are new skills:
        6. For each new skill, determine the correct section in README.md:
           - Discover section names and heading format by reading the actual README content — do NOT hardcode section names.
           - Match the skill's category folder to the corresponding README section.
           - If no matching section exists, create a new section following the same heading format as existing sections.
        7. Add each new skill as a bullet point in the correct section using this exact format:
           *   **skill-name**: Brief description.
        8. Within each section, sort all skills alphabetically by skill name.
        9. Write the updated content to README.md using the edit tool.

        10. Build an ASCII table of all newly added skills with these columns:
            +----------------------------+----------------------------+-------------------------------------------+
            | Category                   | Skill Name                 | Description                               |
            +----------------------------+----------------------------+-------------------------------------------+
            | category-folder-name       | skill-name                 | Brief description from skills/README.md   |
            +----------------------------+----------------------------+-------------------------------------------+

        Call task_complete with status: completed and ONLY the ASCII table as the summary.
        IMPORTANT: The summary must be the ASCII table only — no commentary, no extra text.
        IMPORTANT: Discover section names by reading the README. Never hardcode them.